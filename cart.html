<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Корзина - GameTech</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="top-bar">
        <div class="container">
            <div class="top-bar-content">
                <span>🛒 Ваша корзина</span>
                <div class="top-bar-links">
                    <a href="index.html">Главная</a>
                    <a href="pcs.html">Игровые ПК</a>
                    <a href="configurator.html">Конфигуратор</a>
                </div>
            </div>
        </div>
    </div>

    <header class="site-header">
        <div class="container">
            <div class="header-main">
                <a class="brand" href="index.html">
                    <div class="logo-glow">
                        <span style="color: white; font-size: 24px; font-weight: bold;">GT</span>
                    </div>
                    <span class="brand-name">GameTech</span>
                </a>
                <nav class="main-nav">
                    <a class="nav-link" href="index.html">Главная</a>
                    <a class="nav-link" href="pcs.html">Игровые ПК</a>
                    <a class="nav-link" href="components.html">Комплектующие</a>
                    <a class="nav-link" href="periphery.html">Периферия</a>
                    <a class="nav-link" href="configurator.html">Конфигуратор</a>
                    <span id="headerAuthNav"></span>
                </nav>
                <div class="header-actions">
                    <button class="btn-cart">
                        🛒 Корзина
                        <span class="cart-badge">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="categories-gaming">
            <div class="container">
                <div class="section-header">
                    <h1 class="section-title">Корзина</h1>
                </div>
                <p id="cartEmpty" style="color: var(--text-secondary);">В корзине пока нет товаров.</p>
                <div id="cartItems" class="cart-items"></div>

                <div class="cart-summary">
                    <div class="summary-item">
                        <span>Всего товаров</span>
                        <strong id="cartItemsCount">0</strong>
                    </div>
                    <div class="summary-item summary-total">
                        <span>Итог</span>
                        <strong id="cartGrandTotal">0 ₽</strong>
                    </div>
                    <div class="build-actions" style="margin-top: 12px;">
                        <button id="checkoutBtn" class="btn btn-primary" style="flex: 2;">Оформить заказ</button>
                        <button id="clearCartBtn" class="btn btn-secondary" style="flex: 1;">Очистить</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/header-auth.js"></script>
    <script src="js/cart.js?v=7"></script>
</body>
</html>
