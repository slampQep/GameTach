<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админ-панель - GameTech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: white; }
        
        .admin-header {
            background: #1a1a1a;
            padding: 15px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .admin-container {
            display: flex;
            min-height: 100vh;
        }
        
        .admin-sidebar {
            width: 250px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            padding: 20px 0;
        }
        
        .admin-main {
            flex: 1;
            padding: 20px;
        }
        
        .admin-card {
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .admin-btn {
            background: #ff6b00;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        
        .logout-btn {
            background: #ff4444;
        }
        
        .menu-item {
            display: block;
            padding: 12px 20px;
            color: #b0b0b0;
            text-decoration: none;
            border-left: 3px solid transparent;
        }
        
        .menu-item:hover, .menu-item.active {
            background: #2a2a2a;
            color: white;
            border-left-color: #ff6b00;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #ff6b00;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <div>
            <h1>👑 GameTech Admin</h1>
            <small id="adminInfo"></small>
        </div>
        <div>
            <button class="admin-btn" onclick="location.href='index.html'">🏠 На сайт</button>
            <button class="admin-btn logout-btn" onclick="logoutAdmin()">🚪 Выйти</button>
        </div>
    </header>
    
    <div class="admin-container">
        <nav class="admin-sidebar" id="adminMenu">
            <!-- Меню будет заполнено динамически -->
        </nav>
        
        <main class="admin-main" id="adminContent">
            <div class="admin-card">
                <h2>Добро пожаловать в админ-панель</h2>
                <p>Выберите раздел для управления в меню слева.</p>
            </div>
        </main>
    </div>

    <script src="js/reviews.js"></script>
    <script>
        // Проверка доступа
        document.addEventListener('DOMContentLoaded', function() {
            const adminSession = JSON.parse(localStorage.getItem('admin_session') || 'null');
            
            if (!adminSession || adminSession.expires < Date.now()) {
                alert('❌ Доступ запрещен. Сначала войдите как администратор.');
                window.location.href = 'admin-login.html';
                return;
            }
            
            // Показываем информацию
            document.getElementById('adminInfo').textContent = 
                `Вы вошли как: ${adminSession.username} (${adminSession.role})`;
            
            // Загружаем меню
            loadAdminMenu();
            
            // Загружаем статистику
            loadAdminStats();
        });
        
        function loadAdminMenu() {
            const menu = document.getElementById('adminMenu');
            menu.innerHTML = `
                <a href="#" class="menu-item active" onclick="setActiveMenu(this); loadDashboard(); return false;">📊 Дашборд</a>
                <a href="#" class="menu-item" onclick="setActiveMenu(this); loadUsersFromDb(); return false;">👥 Пользователи (БД)</a>
                <a href="#" class="menu-item" onclick="setActiveMenu(this); loadUsersPurchases(); return false;">🛒 Покупки клиентов</a>
                <a href="#" class="menu-item" onclick="setActiveMenu(this); loadSupportRequests(); return false;">📋 Заявки поддержки</a>
                <a href="#" class="menu-item" onclick="setActiveMenu(this); loadReviewsModeration(); return false;">💬 Отзывы</a>
                <a href="#" class="menu-item" onclick="setActiveMenu(this); loadFiles(); return false;">📁 Файлы</a>
                <a href="#" class="menu-item" onclick="setActiveMenu(this); loadSettings(); return false;">⚙️ Настройки</a>
                <a href="#" class="menu-item" onclick="setActiveMenu(this); loadLogs(); return false;">📝 Логи</a>
            `;
        }
        
        function loadAdminStats() {
            const users = JSON.parse(localStorage.getItem('users') || '{}');
            const files = JSON.parse(localStorage.getItem('db_files') || '[]');
            let pendingReviews = 0;
            if (window.GameTechReviews) {
                pendingReviews = window.GameTechReviews.listForAdmin().filter(function (r) {
                    return r.status === 'pending';
                }).length;
            }
            
            const content = `
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="stat-number">${Object.keys(users).length}</div>
                        <div>Пользователей</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${files.length}</div>
                        <div>Файлов</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${files.filter(f => f.encrypted).length}</div>
                        <div>Зашифровано</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${pendingReviews}</div>
                        <div>Отзывов на модерации</div>
                    </div>
                </div>
            `;
            
            document.getElementById('adminContent').innerHTML = 
                `<div class="admin-card"><h2>📊 Статистика</h2>${content}</div>`;
        }

        // Переключение активного пункта меню
        function setActiveMenu(link) {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            link.classList.add('active');
        }

        // Дашборд
        function loadDashboard() {
            loadAdminStats();
        }

        // Список пользователей
        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('users') || '{}');
            const rows = Object.values(users).map((u, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${u.name || '-'}</td>
                    <td>${u.email}</td>
                    <td>${u.role || 'user'}</td>
                    <td>${u.registered ? new Date(u.registered).toLocaleString('ru-RU') : '-'}</td>
                    <td>
                        <button class="admin-btn" onclick="changeUserRole('${u.email}')">Сделать админом</button>
                    </td>
                </tr>
            `).join('') || `<tr><td colspan="6" style="text-align:center; padding:10px;">Пользователей пока нет</td></tr>`;

            document.getElementById('adminContent').innerHTML = `
                <div class="admin-card">
                    <h2>👥 Пользователи</h2>
                    <p style="margin-top:5px; color:#b0b0b0;">Управление зарегистрированными пользователями</p>
                    <div style="overflow-x:auto; margin-top:15px;">
                        <table style="width:100%; border-collapse:collapse; font-size:14px;">
                            <thead>
                                <tr>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">#</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Имя</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Email</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Роль</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Зарегистрирован</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Действия</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function escAdminHtml(s) {
            return String(s || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function loadReviewsModeration() {
            const GR = window.GameTechReviews;
            if (!GR) {
                document.getElementById('adminContent').innerHTML =
                    '<div class="admin-card"><p>Модуль отзывов не загружен.</p></div>';
                return;
            }
            const all = GR.listForAdmin();
            const rows = all.map(function (r, index) {
                const st = r.status || 'pending';
                const stColor = st === 'approved' ? '#9cffcb' : st === 'hidden' ? '#ff9a9a' : '#ffd48a';
                return `
                <tr>
                    <td>${index + 1}</td>
                    <td>${escAdminHtml(r.productTitle || r.productId)}<br><small style="color:#888;">${escAdminHtml(r.productType)} / ${escAdminHtml(r.productId)}</small></td>
                    <td>${escAdminHtml(r.authorName || '')}<br><small style="color:#888;">${escAdminHtml(r.authorEmail || '')}</small></td>
                    <td>${r.rating || '-'}</td>
                    <td style="max-width:240px; font-size:12px;">${escAdminHtml((r.text || '').slice(0, 200))}${(r.text || '').length > 200 ? '…' : ''}</td>
                    <td style="color:${stColor}; font-weight:600;">${escAdminHtml(st)}</td>
                    <td>${r.createdAt ? new Date(r.createdAt).toLocaleString('ru-RU') : '-'}</td>
                    <td>
                        ${st !== 'approved' ? `<button class="admin-btn" onclick="adminReviewAction('${r.id}','approved')">Одобрить</button>` : ''}
                        ${st !== 'hidden' ? `<button class="admin-btn" style="background:#555;" onclick="adminReviewAction('${r.id}','hidden')">Скрыть</button>` : ''}
                        <button class="admin-btn logout-btn" onclick="adminReviewDelete('${r.id}')">Удалить</button>
                    </td>
                </tr>`;
            }).join('') || `<tr><td colspan="8" style="text-align:center; padding:10px;">Отзывов пока нет</td></tr>`;

            document.getElementById('adminContent').innerHTML = `
                <div class="admin-card">
                    <h2>💬 Модерация отзывов</h2>
                    <p style="margin-top:5px; color:#b0b0b0;">Новые отзывы приходят со статусом «pending». После одобрения они видны всем на сайте.</p>
                    <div style="overflow-x:auto; margin-top:15px;">
                        <table style="width:100%; border-collapse:collapse; font-size:13px;">
                            <thead>
                                <tr>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">#</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Товар</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Автор</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">★</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Текст</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Статус</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Дата</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Действия</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function adminReviewAction(id, status) {
            if (!window.GameTechReviews) return;
            window.GameTechReviews.setStatus(id, status);
            const logs = JSON.parse(localStorage.getItem('admin_logs') || '[]');
            logs.unshift({ type: 'review_moderation', reviewId: id, status: status, timestamp: new Date().toISOString() });
            localStorage.setItem('admin_logs', JSON.stringify(logs));
            loadReviewsModeration();
        }

        function adminReviewDelete(id) {
            if (!confirm('Удалить отзыв безвозвратно?')) return;
            if (!window.GameTechReviews) return;
            window.GameTechReviews.removeReview(id);
            const logs = JSON.parse(localStorage.getItem('admin_logs') || '[]');
            logs.unshift({ type: 'review_delete', reviewId: id, timestamp: new Date().toISOString() });
            localStorage.setItem('admin_logs', JSON.stringify(logs));
            loadReviewsModeration();
        }

        function changeUserRole(email) {
            const users = JSON.parse(localStorage.getItem('users') || '{}');
            const user = users[email];
            if (!user) return;

            const newRole = (user.role === 'admin' || user.role === 'superadmin') ? 'user' : 'admin';
            if (!confirm(`Изменить роль пользователя ${email} на "${newRole}"?`)) return;

            user.role = newRole;
            users[email] = user;
            localStorage.setItem('users', JSON.stringify(users));

            // Логируем изменение
            const logs = JSON.parse(localStorage.getItem('admin_logs') || '[]');
            logs.unshift({
                type: 'role_change',
                email,
                newRole,
                timestamp: new Date().toISOString()
            });
            localStorage.setItem('admin_logs', JSON.stringify(logs));

            loadUsers();
        }

        // Список файлов
        function loadFiles() {
            const files = JSON.parse(localStorage.getItem('db_files') || '[]');
            const rows = files.map((f, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${f.name}</td>
                    <td>${f.type || '-'}</td>
                    <td>${(f.size / 1024).toFixed(1)} КБ</td>
                    <td>${f.encrypted ? 'Да' : 'Нет'}</td>
                    <td>${f.visibility || 'private'}</td>
                    <td>${f.uploadDate ? new Date(f.uploadDate).toLocaleString('ru-RU') : '-'}</td>
                </tr>
            `).join('') || `<tr><td colspan="7" style="text-align:center; padding:10px;">Файлов пока нет</td></tr>`;

            document.getElementById('adminContent').innerHTML = `
                <div class="admin-card">
                    <h2>📁 Файлы</h2>
                    <p style="margin-top:5px; color:#b0b0b0;">Файлы, загруженные пользователями (db_files)</p>
                    <div style="overflow-x:auto; margin-top:15px;">
                        <table style="width:100%; border-collapse:collapse; font-size:14px;">
                            <thead>
                                <tr>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">#</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Имя</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Тип</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Размер</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Зашифровано</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Доступ</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Загружен</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // Настройки сайта
        function loadSettings() {
            const settings = JSON.parse(localStorage.getItem('admin_settings') || '{}');

            document.getElementById('adminContent').innerHTML = `
                <div class="admin-card">
                    <h2>⚙️ Настройки</h2>
                    <p style="margin-top:5px; color:#b0b0b0;">Основные настройки админ-панели (хранятся в admin_settings)</p>
                    <form id="settingsForm" style="margin-top:15px;" onsubmit="saveSettings(event)">
                        <div style="margin-bottom:12px;">
                            <label>Название сайта</label>
                            <input type="text" id="settingSiteName" value="${settings.siteName || 'GameTech'}" style="width:100%; padding:8px; margin-top:4px; border-radius:6px; border:1px solid #333; background:#1a1a1a; color:white;">
                        </div>
                        <div style="margin-bottom:12px;">
                            <label>Валюта</label>
                            <input type="text" id="settingCurrency" value="${settings.currency || '₽'}" style="width:100%; padding:8px; margin-top:4px; border-radius:6px; border:1px solid #333; background:#1a1a1a; color:white;">
                        </div>
                        <div style="margin-bottom:12px;">
                            <label><input type="checkbox" id="settingMaintenance" ${settings.maintenance ? 'checked' : ''}> Режим обслуживания</label>
                        </div>
                        <div style="margin-bottom:12px;">
                            <label><input type="checkbox" id="settingRegistration" ${settings.registrationEnabled !== false ? 'checked' : ''}> Разрешить регистрацию</label>
                        </div>
                        <button type="submit" class="admin-btn">💾 Сохранить настройки</button>
                    </form>
                </div>
            `;
        }

        function saveSettings(event) {
            event.preventDefault();
            const settings = {
                siteName: document.getElementById('settingSiteName').value.trim() || 'GameTech',
                currency: document.getElementById('settingCurrency').value.trim() || '₽',
                maintenance: document.getElementById('settingMaintenance').checked,
                registrationEnabled: document.getElementById('settingRegistration').checked
            };

            localStorage.setItem('admin_settings', JSON.stringify(settings));

            const logs = JSON.parse(localStorage.getItem('admin_logs') || '[]');
            logs.unshift({
                type: 'settings_update',
                settings,
                timestamp: new Date().toISOString()
            });
            localStorage.setItem('admin_logs', JSON.stringify(logs));

            alert('Настройки сохранены');
        }

        // Логи
        function loadLogs() {
            const logs = JSON.parse(localStorage.getItem('admin_logs') || '[]');
            const rows = logs.map((log, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${log.type || '-'}</td>
                    <td>${log.email || '-'}</td>
                    <td>${log.newRole || '-'}</td>
                    <td>${log.timestamp ? new Date(log.timestamp).toLocaleString('ru-RU') : '-'}</td>
                </tr>
            `).join('') || `<tr><td colspan="5" style="text-align:center; padding:10px;">Логов пока нет</td></tr>`;

            document.getElementById('adminContent').innerHTML = `
                <div class="admin-card">
                    <h2>📝 Логи</h2>
                    <p style="margin-top:5px; color:#b0b0b0;">События админ-панели (смена ролей, изменения настроек и т.д.)</p>
                    <div style="overflow-x:auto; margin-top:15px;">
                        <table style="width:100%; border-collapse:collapse; font-size:14px;">
                            <thead>
                                <tr>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">#</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Тип</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Email</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Роль</th>
                                    <th style="text-align:left; padding:8px; border-bottom:1px solid #333;">Время</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        
        function logoutAdmin() {
            localStorage.removeItem('admin_session');
            alert('👋 Выход из админ-панели');
            window.location.href = 'index.html';
        }
        
        // Делаем функцию доступной глобально
        window.logoutAdmin = logoutAdmin;
    </script>
    <script src="js/admin-users-db.js"></script>
</body>
</html>
